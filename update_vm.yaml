- name: Update Ubuntu Server VMs
  hosts: ubuntu_vms
  serial: 1
  become: true
  become_method: sudo
  gather_facts: yes
  vars:
    ansible_command_timeout: 3600
    ansible_ssh_common_args: '-o ServerAliveInterval=15 -o ServerAliveCountMax=3 -o ConnectTimeout=10'
  
  pre_tasks:
    - name: Show current SSH user
      debug:
        msg: Connected as {{ ansible_user_id }}
    
    - name: Wait for apt/dpkg locks to be released
      shell: |
        timeout=300
        elapsed=0
        while fuser /var/lib/dpkg/lock >/dev/null 2>&1 || \
              fuser /var/lib/apt/lists/lock >/dev/null 2>&1 || \
              fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1; do
          echo "APT lock detected. Waiting..."
          sleep 10
          elapsed=$((elapsed + 10))
          if [ $elapsed -ge $timeout ]; then
            echo "Timeout waiting for APT locks after ${timeout}s"
            exit 1
          fi
        done
      changed_when: false
    
    - name: Ensure sudo access
      assert:
        that:
          - ansible_user_id == 'root'
        fail_msg: Playbook must be run with sudo privileges.
  
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600
      register: apt_cache_update
      timeout: 300
    
    - name: Upgrade all packages
      apt:
        upgrade: dist
        autoremove: yes
        autoclean: yes
        force_apt_get: yes
        dpkg_options: "force-confdef,force-confold"
      register: apt_upgrade_result
    
    - name: Check if reboot is required
      stat:
        path: /var/run/reboot-required
      register: reboot_required
    
    - name: Display reboot requirement status
      debug:
        msg: "Reboot required: {{ reboot_required.stat.exists }}"
    
    - name: Log reboot start time
      command: date "+%Y-%m-%d %H:%M:%S"
      register: reboot_start
      when: reboot_required.stat.exists
      changed_when: false
    
    - name: Enable verbose SSH logging for reboot (diagnostic)
      set_fact:
        ansible_ssh_common_args: '-vvv -o ServerAliveInterval=15 -o ServerAliveCountMax=3 -o ConnectTimeout=10'
      when: reboot_required.stat.exists
    
    - name: Show SSH connection parameters
      debug:
        msg: "Using SSH args: {{ ansible_ssh_common_args }}"
      when: reboot_required.stat.exists
    
    - block:
        - name: Trigger reboot using shell command
          shell: 'sleep 2 && shutdown -r now "Ansible reboot"'
          async: 1
          poll: 0
          when: reboot_required.stat.exists
        
        - name: Log reboot trigger time
          debug:
            msg: "Reboot command issued for {{ inventory_hostname }} at {{ ansible_date_time.iso8601 }}"
          when: reboot_required.stat.exists
        
        - name: Pause to ensure reboot command is issued
          pause:
            seconds: 10
          when: reboot_required.stat.exists
        
        - name: Wait for system to come back up
          wait_for_connection:
            delay: 15
            sleep: 10
            timeout: 600
          when: reboot_required.stat.exists
          register: connection_wait
        
        - name: Log successful reconnection
          debug:
            msg: "Successfully reconnected to {{ inventory_hostname }}"
          when: reboot_required.stat.exists
        
        - name: Wait for system to be fully ready
          shell: uptime
          register: uptime_output
          retries: 10
          delay: 10
          until: uptime_output.rc == 0
          when: reboot_required.stat.exists
          changed_when: false
        
        - name: Show system status after reboot
          debug:
            msg: "System {{ inventory_hostname }} is ready: {{ uptime_output.stdout }}"
          when: reboot_required.stat.exists
      
      rescue:
        - name: Log reboot issue with details
          debug:
            msg: |
              Encountered issue during reboot on {{ inventory_hostname }}
              Attempting recovery...
              Last known state: {{ uptime_output | default('unknown') }}
        
        - name: Extended wait for connection recovery
          wait_for_connection:
            delay: 30
            sleep: 15
            timeout: 600
          register: recovery_connection
        
        - name: Log recovery connection status
          debug:
            msg: "Recovery connection attempt completed for {{ inventory_hostname }}"
        
        - name: Verify system is back online
          command: uptime
          register: recovery_uptime
          changed_when: false
        
        - name: Show recovery status
          debug:
            msg: "System {{ inventory_hostname }} recovered: {{ recovery_uptime.stdout }}"
    
    - name: Reset SSH logging to normal (post-reboot)
      set_fact:
        ansible_ssh_common_args: '-o ServerAliveInterval=15 -o ServerAliveCountMax=3 -o ConnectTimeout=10'
      when: reboot_required.stat.exists
    
    - name: Log reboot end time
      command: date "+%Y-%m-%d %H:%M:%S"
      register: reboot_end
      when: reboot_required.stat.exists
      changed_when: false
    
    - name: Show reboot duration
      debug:
        msg: >
          Host {{ inventory_hostname }} rebooted in {{
            ( (reboot_end.stdout | to_datetime('%Y-%m-%d %H:%M:%S')) -
              (reboot_start.stdout | to_datetime('%Y-%m-%d %H:%M:%S'))
            ).total_seconds() | int
          }} seconds.
      when: reboot_required.stat.exists and reboot_end.stdout is defined
    
    - name: Verify system is responsive
      command: uptime
      changed_when: false
      register: uptime_check
    
    - name: Show system uptime
      debug:
        msg: "{{ uptime_check.stdout }}"
    
    - name: Show completion status for host
      debug:
        msg: "Update completed for {{ inventory_hostname }} - Reboot was {{ 'REQUIRED' if reboot_required.stat.exists else 'NOT required' }}"

- name: Continue with remaining hosts
  hosts: ubuntu_vms
  serial: 1
  become: true
  gather_facts: no
  tasks:
    - name: Final health check
      ping:
      
    - name: Get final system info
      command: uptime
      register: final_uptime
      changed_when: false
      
    - name: Show completion message
      debug:
        msg: |
          ========================================
          All updates completed successfully for {{ inventory_hostname }}
          Current uptime: {{ final_uptime.stdout }}
          ========================================
