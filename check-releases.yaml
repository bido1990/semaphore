---
- name: Controlla nuove release GitHub e notifica Discord
  hosts: oracle_vps
  gather_facts: false

  vars:
    state_file: /home/semaphore/scripts/last-versions.txt
    repos:
      - name: Authentik
        repo: goauthentik/authentik
      - name: Traefik
        repo: traefik/traefik
      - name: Komodo
        repo: moghtech/komodo
      - name: Semaphore
        repo: semaphoreui/semaphore
      - name: AdGuard Home
        repo: AdguardTeam/AdGuardHome
      - name: CrowdSec
        repo: crowdsecurity/crowdsec
      - name: Paperless-ngx
        repo: paperless-ngx/paperless-ngx
      - name: Immich
        repo: immich-app/immich

  tasks:

    - name: Assicura che la directory scripts esista
      ansible.builtin.file:
        path: /home/semaphore/scripts
        state: directory
        mode: "0755"

    - name: Assicura che il file di stato esista e non sia vuoto
      ansible.builtin.shell: |
        touch {{ state_file }}
      args:
        executable: /bin/bash
      changed_when: false

    - name: Recupera ultima release stabile da GitHub API
      ansible.builtin.shell: |
        curl -s \
          -H "Accept: application/vnd.github+json" \
          "https://api.github.com/repos/{{ item.repo }}/releases/latest" \
          | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'])"
      register: github_response
      loop: "{{ repos }}"
      loop_control:
        label: "{{ item.name }}"
      changed_when: false

    - name: Leggi file di stato corrente
      ansible.builtin.shell: cat {{ state_file }} || true
      register: state_content
      changed_when: false

    - name: Controlla e notifica nuove versioni
      ansible.builtin.include_tasks: check-single-release.yaml
      loop: "{{ github_response.results }}"
      loop_control:
        label: "{{ item.item.name }}"
      vars:
        state_lines: "{{ state_content.stdout }}"
