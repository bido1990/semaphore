---
- name: Estrai tag dalla risposta API
  ansible.builtin.set_fact:
    latest_tag: "{{ item.stdout | trim }}"
    repo_name: "{{ item.item.name }}"
    repo_path: "{{ item.item.repo }}"

- name: Leggi versione precedente dal file di stato
  ansible.builtin.set_fact:
    last_tag: >-
      {{ (state_lines
         | regex_search('^' + repo_name + '=(.+)$', '\1', multiline=True)
         or [''])[0] }}

- name: Notifica Discord per nuova versione
  ansible.builtin.uri:
    url: "{{ discord_webhook_url }}"
    method: POST
    body_format: json
    body:
      username: "Homelab Updates"
      content: "**{{ repo_name }}** `{{ latest_tag }}` — <https://github.com/{{ repo_path }}/releases/tag/{{ latest_tag }}>"
    status_code: 204
  when: latest_tag != last_tag and latest_tag != ''

- name: Aggiorna file di stato
  ansible.builtin.lineinfile:
    path: "{{ state_file }}"
    regexp: "^{{ repo_name }}="
    line: "{{ repo_name }}={{ latest_tag }}"
  when: latest_tag != last_tag and latest_tag != ''

# Aggiungi alla lista aggiornamenti per il riepilogo finale
- name: Registra aggiornamento rilevato
  ansible.builtin.set_fact:
    updates_found: "{{ (updates_found | default([])) + [repo_name + ' ' + last_tag + ' → ' + latest_tag] }}"
  when: latest_tag != last_tag and latest_tag != ''

# Aggiungi sempre alla lista versioni correnti
- name: Registra versione corrente per il resoconto
  ansible.builtin.set_fact:
    versions_summary: "{{ (versions_summary | default([])) + [repo_name + ': ' + latest_tag] }}"
  when: latest_tag != ''
