---
- name: Backup Trek zip files to NAS via rsync
  hosts: vm_personal
  become: true
  vars:
    backup_src: "/home/guido/docker/trek/data/backups/"
    backup_dst: "/volume1/docker/trek/backups"
    nas_host: "192.168.50.50"
    nas_user: "guido"
    keep_days: 7

  tasks:
    - name: Controlla che la cartella sorgente esista
      stat:
        path: "{{ backup_src }}"
      register: src_stat

    - name: Fallisci se la cartella sorgente non è accessibile
      fail:
        msg: "Cartella sorgente {{ backup_src }} non trovata. Controlla il volume Trek."
      when: not src_stat.stat.exists or not src_stat.stat.isdir

    - name: Copia i backup Trek sul NAS via rsync
      synchronize:
        src: "{{ backup_src }}"
        dest: "{{ nas_user }}@{{ nas_host }}:{{ backup_dst }}"
        mode: push
        rsync_opts:
          - "--include=auto-backup-*.zip"
          - "--exclude=*"

    - name: Cerca backup più vecchi di {{ keep_days }} giorni sul NAS
      delegate_to: "{{ nas_host }}"
      remote_user: "{{ nas_user }}"
      find:
        paths: "{{ backup_dst }}"
        patterns: "auto-backup-*.zip"
        age: "{{ keep_days }}d"
      register: old_backups

    - name: Elimina backup vecchi sul NAS
      delegate_to: "{{ nas_host }}"
      remote_user: "{{ nas_user }}"
      file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ old_backups.files }}"
      when: old_backups.matched > 0
